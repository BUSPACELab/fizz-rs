# Build and test (includes building Fizz via getdeps in build.rs).
name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build and test
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Fizz system dependencies (getdeps)
        working-directory: third_party/fizz
        run: |
          sudo python3 build/fbcode_builder/getdeps.py --allow-system-packages install-system-deps --recursive fizz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      # Share rustc/llvm invocations across runs (helps when rust-cache misses).
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          # Native deps live under target/; default prefixes are usually enough.
          shared-key: fizz-rs

      # The dominant build cost is `getdeps build fizz` (folly + fast_float +
      # oqs + ...). Its install tree lives under
      # `target/debug/build/fizz_rs-*/out/fizz-install/` for this workflow
      # (ci.yml builds in debug profile via `cargo test` / `cargo build`).
      # Swatinem's cache may prune it, so we restore it explicitly here keyed
      # on the third_party/fizz submodule SHA. Separate `-debug-` suffix so it
      # doesn't collide with benchmark.yml's release cache.
      - name: Compute fizz submodule SHA
        id: fizz-sha
        run: |
          SHA=$(git -C third_party/fizz rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "fizz submodule SHA: $SHA"

      - name: Cache fizz/folly install tree
        uses: actions/cache@v4
        with:
          path: target/debug/build/fizz_rs-*/out/fizz-install
          key: fizz-install-${{ runner.os }}-debug-${{ steps.fizz-sha.outputs.sha }}
          restore-keys: |
            fizz-install-${{ runner.os }}-debug-

      # One compile pass: library + integration tests (avoids redundant `cargo build`).
      - name: Build and test
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cargo test

      - name: Build tls_bench_ablation
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cargo build -p tls_bench_ablation
