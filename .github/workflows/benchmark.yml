# Manual benchmark: builds the release binary, runs `tls_bench_ablation`
# over a sweep of N (concurrent connection counts), generates the
# USENIX-style throughput-vs-N plot, and uploads the CSV + PDF + PNG as
# workflow artifacts.
#
# Triggered manually via the "Run workflow" button (workflow_dispatch). It is
# expensive — the first run on a cache miss can spend ~30–60 minutes building
# fizz/folly via getdeps — so we don't run it on every PR.
name: benchmark

on:
  workflow_dispatch:
    inputs:
      pairs_sweep:
        description: 'Comma-separated N values (e.g. "1,2,4,8,16,32,64")'
        required: false
        default: '1,2,4,8,16,32,64'
      batch_size:
        description: 'Echo payload size in bytes'
        required: false
        default: '65536'
      rounds:
        description: 'Echo cycles per client at each N'
        required: false
        default: '64'
      runs:
        description: 'Timed iterations per (backend, N), median reported'
        required: false
        default: '3'
      warmup:
        description: 'Warmup iterations to discard before timing'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  bench:
    name: benchmark
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Fizz system dependencies (getdeps)
        working-directory: third_party/fizz
        run: |
          sudo python3 build/fbcode_builder/getdeps.py \
            --allow-system-packages install-system-deps --recursive fizz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fizz-rs

      # The dominant build cost is `getdeps build fizz` (folly + fast_float +
      # oqs + ...). Its install tree lives under `target/release/build/fizz_rs-*/out/fizz-install/`.
      # Swatinem's cache may prune it, so we restore it explicitly here keyed
      # on the third_party/fizz submodule SHA. As long as the SHA is stable,
      # getdeps short-circuits and the build drops from ~16 min to a few min.
      - name: Compute fizz submodule SHA
        id: fizz-sha
        run: |
          SHA=$(git -C third_party/fizz rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "fizz submodule SHA: $SHA"

      - name: Cache fizz/folly install tree
        uses: actions/cache@v4
        with:
          path: target/release/build/fizz_rs-*/out/fizz-install
          key: fizz-install-${{ runner.os }}-release-${{ steps.fizz-sha.outputs.sha }}
          restore-keys: |
            fizz-install-${{ runner.os }}-release-

      - name: Build tls_bench_ablation (release)
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cargo build --release -p tls_bench_ablation

      # Allow core dumps so a backtrace can be captured if the bench segfaults.
      # Writes cores to a known directory readable by subsequent steps. The
      # `ulimit -c unlimited` inside the actual sweep step is what enables core
      # generation for the bench process — runner-level sysctls only set the
      # *path* and the system-level limits.
      - name: Configure core dumps and install gdb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gdb
          sudo mkdir -p /cores
          sudo chmod 1777 /cores
          sudo sysctl -w kernel.core_pattern='/cores/core.%e.%p'
          # Disable apport so it doesn't intercept the dump.
          if [ -d /etc/apport ]; then
            sudo systemctl stop apport.service 2>/dev/null || true
            echo "enabled=0" | sudo tee /etc/default/apport > /dev/null || true
          fi
          ulimit -c unlimited
          echo "core_pattern=$(cat /proc/sys/kernel/core_pattern)"

      # One invocation per (backend, N). Each invocation is independent so any
      # leaked state from a prior backend can't affect the next run. We allow
      # the loop to continue past a crashing invocation (without `set -e`) so
      # we capture the core dump and a partial CSV; the workflow still fails
      # at the end via `exit $bench_status` if any invocation crashed.
      - name: Run scaling sweep (per-backend, per-N)
        run: |
          ulimit -c unlimited
          OUT=scaling_results.csv
          echo "backend,pairs,client_workers,server_workers,max_blocking_threads,batch_size,rounds,wall_ms,total_bytes,mb_per_s,error" > "$OUT"
          IFS=',' read -ra NS <<< "${{ github.event.inputs.pairs_sweep }}"
          bench_status=0
          # Don't `set -e` so a single crashing invocation doesn't kill the
          # whole step — we want partial CSV data and a chance for the dump
          # capture step to fire.
          set +e
          for N in "${NS[@]}"; do
            for BACKEND in tcp rustls fizz fizz-cpp; do
              echo ">>> N=$N backend=$BACKEND" >&2
              ./target/release/tls_bench_ablation \
                --backend "$BACKEND" --pairs "$N" \
                --batch-size ${{ github.event.inputs.batch_size }} \
                --rounds ${{ github.event.inputs.rounds }} \
                --warmup ${{ github.event.inputs.warmup }} \
                --runs ${{ github.event.inputs.runs }} \
                >> "$OUT"
              rc=$?
              if [ "$rc" -ne 0 ]; then
                echo "!!! crashed: N=$N backend=$BACKEND exit=$rc" >&2
                bench_status=$rc
                # Stop the whole sweep on first crash so the core dump on
                # disk corresponds to the (backend, N) we just printed.
                break 2
              fi
            done
          done
          echo "--- $OUT ---"
          cat "$OUT"
          # Exit non-zero on any crash so the on-failure backtrace step fires.
          exit $bench_status

      - name: Capture backtrace from core dump (on failure)
        if: failure()
        run: |
          set +e
          ls -la /cores/ || true
          shopt -s nullglob
          for c in /cores/core.*; do
            echo "============================================================"
            echo "core dump: $c"
            echo "============================================================"
            file "$c" || true
            gdb --batch \
              --quiet \
              -ex "set print pretty on" \
              -ex "set print thread-events off" \
              -ex "info threads" \
              -ex "thread apply all bt full" \
              ./target/release/tls_bench_ablation "$c" 2>&1 | tee -a /cores/backtrace.txt
            echo
          done
          if [ ! -s /cores/backtrace.txt ]; then
            echo "no core dump found in /cores/" | tee /cores/backtrace.txt
            echo "ulimit -c was: $(ulimit -c)"
            echo "kernel.core_pattern was: $(cat /proc/sys/kernel/core_pattern 2>/dev/null || echo unknown)"
          fi

      - name: Upload core dumps and backtrace (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-dumps
          path: /cores/
          if-no-files-found: warn
          retention-days: 14

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync plotting environment
        run: uv sync --project scripts/benchmarking --frozen

      - name: Generate plot
        run: |
          uv run --project scripts/benchmarking \
            python scripts/benchmarking/plot_scaling.py \
            scaling_results.csv scaling_results

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: scaling_results.csv
          path: scaling_results.csv
          if-no-files-found: error
          retention-days: 30

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: scaling_results.pdf
          path: scaling_results.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload PNG
        uses: actions/upload-artifact@v4
        with:
          name: scaling_results.png
          path: scaling_results.png
          if-no-files-found: error
          retention-days: 30
